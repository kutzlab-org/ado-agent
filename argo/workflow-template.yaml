# WorkflowTemplate: clone → build alpine + ubuntu (parallel) → deploy both (parallel).
#
# Prerequisites:
#   1. A registry credentials secret for Kaniko:
#        kubectl create secret docker-registry registry-credentials \
#          --docker-server=<YOUR_REGISTRY> \
#          --docker-username=<USERNAME> \
#          --docker-password=<PASSWORD_OR_TOKEN> \
#          -n argowf
#
#   2. The two Deployments in deployments.yaml must already exist in the cluster.
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ado-agent-build-deploy
  namespace: argowf
spec:
  podGC:
    strategy: OnWorkflowCompletion

  arguments:
    parameters:
      - name: git-sha
        value: "latest"

  templates:
    # -------------------------------------------------------------------------
    # Entry point — three sequential stage groups
    # -------------------------------------------------------------------------
    - name: main
      steps:
        - - name: clone
            template: clone-repo

        - - name: build-alpine
            template: build-image
            arguments:
              artifacts:
                - name: workspace
                  from: "{{steps.clone.outputs.artifacts.workspace}}"
              parameters:
                - name: dockerfile
                  value: ado-agent-alpine.dockerfile
                - name: image
                  value: "kutzlabacr.azurecr.io/ado-agent-alpine:{{workflow.parameters.git-sha}}"
          - name: build-ubuntu
            template: build-image
            arguments:
              artifacts:
                - name: workspace
                  from: "{{steps.clone.outputs.artifacts.workspace}}"
              parameters:
                - name: dockerfile
                  value: ado-agent-ubuntu.dockerfile
                - name: image
                  value: "kutzlabacr.azurecr.io/ado-agent-ubuntu:{{workflow.parameters.git-sha}}"

        - - name: deploy-alpine
            template: deploy-image
            arguments:
              parameters:
                - name: deployment
                  value: ado-agent-alpine
                - name: container
                  value: ado-agent-alpine
                - name: image
                  value: "kutzlabacr.azurecr.io/ado-agent-alpine:{{workflow.parameters.git-sha}}"
          - name: deploy-ubuntu
            template: deploy-image
            arguments:
              parameters:
                - name: deployment
                  value: ado-agent-ubuntu
                - name: container
                  value: ado-agent-ubuntu
                - name: image
                  value: "kutzlabacr.azurecr.io/ado-agent-ubuntu:{{workflow.parameters.git-sha}}"

    # -------------------------------------------------------------------------
    # Clone the repository and emit the workspace as an artifact
    # -------------------------------------------------------------------------
    - name: clone-repo
      outputs:
        artifacts:
          - name: workspace
            path: /workspace
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - git clone https://github.com/kutzlab-org/ado-agent.git /workspace &&
            git -C /workspace checkout {{workflow.parameters.git-sha}}

    # -------------------------------------------------------------------------
    # Build and push a single image with Kaniko
    # -------------------------------------------------------------------------
    - name: build-image
      inputs:
        artifacts:
          - name: workspace
            path: /workspace
        parameters:
          - name: dockerfile
          - name: image
      container:
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--dockerfile=/workspace/{{inputs.parameters.dockerfile}}"
          - "--context=dir:///workspace"
          - "--destination={{inputs.parameters.image}}"
          - "--cache=true"
          - "--cache-ttl=24h"
        volumeMounts:
          - name: kutzlabacr
            mountPath: /kaniko/.docker
      volumes:
        - name: kutzlabacr
          secret:
            secretName: kutzlabacr
            items:
              - key: .dockerconfigjson
                path: config.json

    # -------------------------------------------------------------------------
    # Roll out the new image tag to a Deployment
    # -------------------------------------------------------------------------
    - name: deploy-image
      inputs:
        parameters:
          - name: deployment
          - name: container
          - name: image
      container:
        image: bitnami/kubectl:latest
        command:
          - kubectl
          - set
          - image
          - "deployment/{{inputs.parameters.deployment}}"
          - "{{inputs.parameters.container}}={{inputs.parameters.image}}"
          - -n
          - ado-agent

  entrypoint: main
