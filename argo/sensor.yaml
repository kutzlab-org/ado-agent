# Argo Events Sensor — reacts to a GitHub push and submits the build workflow.
# The git commit SHA from the push payload is forwarded as a workflow parameter
# so Kaniko can tag the built images with it.
---
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: ado-agent-build-sensor
  namespace: ado-agent
spec:
  template:
    serviceAccountName: ado-agent-workflow-sa
  dependencies:
    - name: push-event
      eventSourceName: ado-agent-github
      eventName: ado-agent
  triggers:
    - template:
        name: build-and-deploy
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: ado-agent-build-
                namespace: ado-agent
              spec:
                workflowTemplateRef:
                  name: ado-agent-build-deploy
                arguments:
                  parameters:
                    - name: git-sha
                      value: "placeholder"
          # Override git-sha with the actual commit SHA from the push event.
          parameters:
            - src:
                dependencyName: push-event
                dataKey: body.after
              dest: spec.arguments.parameters.0.value
