# Argo Events EventSource — listens for GitHub push webhooks.
#
# Prerequisites:
#   1. Install Argo Events in your cluster.
#   2. Create a GitHub personal access token (PAT) with repo scope:
#        kubectl create secret generic github-access \
#          --from-literal=token=<YOUR_GITHUB_PAT> \
#          -n ado-agent
#   3. Expose this EventSource's webhook port externally (Ingress or LoadBalancer)
#      and register the URL as a webhook in your GitHub repo:
#        Payload URL : https://<your-host>/push
#        Content type: application/json
#        Events      : Just the push event
#      The port below (12000) is the container port; map accordingly via your Ingress.
---
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: ado-agent-github
  namespace: ado-agent
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  github:
    ado-agent:
      repositories:
        - owner: kutzlab-org
          names:
            - ado-agent
      webhook:
        endpoint: /push
        port: "12000"
        method: POST
      events:
        - push
      apiToken:
        name: github-access
        key: token
      insecure: false
      active: true
      contentType: json
